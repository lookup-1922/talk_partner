<svg viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3B52"/>
      <stop offset="100%" stop-color="#33283A"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FA8A0"/>
      <stop offset="100%" stop-color="#5E8A82"/>
    </linearGradient>
  </defs>

  <!-- 肩・フード -->
  <path d="M 60 560 Q 60 380 200 360 Q 340 380 340 560 Z" fill="url(#hoodieGrad)"/>
  <path d="M 130 400 Q 200 440 270 400 L 260 470 Q 200 500 140 470 Z" fill="#4F7A73"/>

  <!-- 首 -->
  <rect x="175" y="330" width="50" height="60" rx="20" fill="#F1C9A7"/>

  <!-- 髪(後ろ) -->
  <path d="M 90 260 Q 80 150 200 120 Q 320 150 310 260 Q 320 340 270 380 Q 300 260 200 240 Q 100 260 130 380 Q 80 340 90 260 Z" fill="url(#hairGrad)"/>

  <!-- 顔 -->
  <ellipse cx="200" cy="245" rx="105" ry="115" fill="#F6D3B3"/>

  <!-- 髪(前髪) -->
  <path d="M 95 230 Q 90 130 200 110 Q 310 130 305 230 Q 260 160 200 165 Q 140 160 95 230 Z" fill="url(#hairGrad)"/>
  <path d="M 140 175 Q 150 145 165 180 Q 155 200 140 175 Z" fill="url(#hairGrad)"/>
  <path d="M 250 175 Q 245 145 235 180 Q 245 200 250 175 Z" fill="url(#hairGrad)"/>

  <!-- 頬 -->
  <ellipse cx="145" cy="275" rx="18" ry="10" fill="#F0A98C" opacity="0.55"/>
  <ellipse cx="255" cy="275" rx="18" ry="10" fill="#F0A98C" opacity="0.55"/>

  <!-- 目(笑顔・弧を描く) -->
  <g stroke="#33283A" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M 128 254 Q 150 228 174 254"/>
    <path d="M 226 254 Q 250 228 272 254"/>
  </g>

  <!-- 眉 -->
  <path d="M 133 214 Q 152 202 172 212" stroke="#4A3B52" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 228 212 Q 248 202 267 214" stroke="#4A3B52" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- 口(満面の笑み) -->
  <path d="M 168 300 Q 200 335 232 300 Q 200 320 168 300 Z" fill="#B5654A"/>
  <path d="M 178 300 Q 200 314 222 300" stroke="#7A3C28" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- きらめき -->
  <g fill="#E3B23C" opacity="0.9">
    <path d="M 335 150 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z"/>
    <path d="M 70 190 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
  </g>
</svg>
